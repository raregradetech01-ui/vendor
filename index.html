<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vynix Eats | Vendor Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>
    <style>
        :root {
            --bg: #f8f9fc;
            --surface: #ffffff;
            --surface2: #f1f4f9;
            --border: rgba(0,0,0,0.08);
            --text: #1a1e2b;
            --dim: #5b677b;
            --accent: #ff6b35;
            --accent2: #ff9500;
            --success: #2c9a4c;
            --danger: #dc3545;
            --glow: rgba(255, 107, 53, 0.08);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
        /* ... (all your existing CSS remains 100% unchanged) ... */
        /* SUCCESS MODAL */
        #successModal .modal {
            text-align: center;
            width: 380px;
            padding: 40px 30px;
        }
        .success-icon {
            font-size: 4.5rem;
            margin-bottom: 16px;
            animation: pop 0.6s ease;
        }
        @keyframes pop {
            0% { transform: scale(0.3); }
            60% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>
    <!-- (All your existing HTML remains exactly the same until the end) -->

    <!-- SUCCESS MODAL -->
    <div class="modal-bg" id="successModal">
        <div class="modal">
            <div class="success-icon">🎉</div>
            <h3 id="successTitle" style="font-size:1.5rem;margin-bottom:8px;">Success!</h3>
            <p id="successMsg" style="color:var(--dim);margin-bottom:28px;line-height:1.5;"></p>
            <button class="btn btn-primary" style="width:100%;" onclick="hideSuccessModal()">Done</button>
        </div>
    </div>

    <div id="toast"></div>

    <script>
    // FIREBASE
    const firebaseConfig = {
        apiKey: "AIzaSyAxBT0oESoL62oz_x_Z8cMtdENWZPx4tMI",
        authDomain: "pinotp-d7ef5.firebaseapp.com",
        databaseURL: "https://pinotp-d7ef5-default-rtdb.firebaseio.com",
        projectId: "pinotp-d7ef5",
        storageBucket: "pinotp-d7ef5.firebasestorage.app",
        messagingSenderId: "708458917827",
        appId: "1:708458917827:web:375de278577df0adcf9776"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // CLOUDINARY (same as admin system)
    const CLD = { cloudName:'dqkujefxj', uploadPreset:'banter_box', apiUrl:'https://api.cloudinary.com/v1_1' };
    async function uploadToCloudinary(file) {
        const fd = new FormData();
        fd.append('file', file);
        fd.append('upload_preset', CLD.uploadPreset);
        const r = await fetch(`${CLD.apiUrl}/${CLD.cloudName}/image/upload`, { method:'POST', body:fd });
        if (!r.ok) throw new Error(r.statusText);
        return (await r.json()).secure_url;
    }

    // STATE
    let currentKey = null;
    let vendorData = {};
    let menuItems = {};
    const DAYS = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
    let profileImageFile = null;
    let currentImageFile = null;

    // Profile image preview
    document.getElementById('p-image-file').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        profileImageFile = file;
        const reader = new FileReader();
        reader.onload = ev => {
            document.getElementById('profileImagePreview').src = ev.target.result;
            document.getElementById('profile-upload-status').textContent = 'file selected';
        };
        reader.readAsDataURL(file);
    });

    // Menu image preview
    document.getElementById('mi-image-file').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        currentImageFile = file;
        const reader = new FileReader();
        reader.onload = ev => {
            document.getElementById('imgPreview').src = ev.target.result;
            document.getElementById('upload-status').textContent = 'file selected';
        };
        reader.readAsDataURL(file);
    });

    // SUCCESS MODAL
    function showSuccessModal(title, msg) {
        document.getElementById('successTitle').textContent = title;
        document.getElementById('successMsg').innerHTML = msg;
        document.getElementById('successModal').classList.add('open');
    }
    function hideSuccessModal() {
        document.getElementById('successModal').classList.remove('open');
    }

    // ... (all your existing functions: showLogin, showRegister, submitRegistration, doLogin, etc. remain unchanged) ...

    // PROFILE SAVE - now shows success modal
    async function saveProfile() {
        const updates = {
            name: document.getElementById('p-name').value.trim(),
            cuisine: document.getElementById('p-cuisine').value.trim(),
            phone: document.getElementById('p-phone').value.trim(),
            email: document.getElementById('p-email').value.trim(),
            address: document.getElementById('p-address').value.trim(),
            minOrder: parseFloat(document.getElementById('p-minorder').value) || 0,
            distance: document.getElementById('p-distance').value.trim() || '2.5 km',
            deliveryTime: document.getElementById('p-deliveryTime').value.trim() || '30 min',
            description: document.getElementById('p-desc').value.trim()
        };

        if (profileImageFile) {
            document.getElementById('profile-upload-status').textContent = 'uploading to Cloudinary...';
            try {
                updates.imageURL = await uploadToCloudinary(profileImageFile);
                document.getElementById('p-image-url').value = updates.imageURL;
            } catch (e) {
                showToast('❌ Image upload failed', 'error');
                return;
            }
        } else if (document.getElementById('p-image-url').value) {
            updates.imageURL = document.getElementById('p-image-url').value;
        }

        db.ref('vendors/' + currentKey).update(updates).then(() => {
            vendorData = { ...vendorData, ...updates };
            document.getElementById('tb-name').textContent = updates.name;
            document.getElementById('tb-cuisine').textContent = updates.cuisine;

            // SUCCESS MODAL
            showSuccessModal("✅ Profile Updated!", 
                "Your restaurant information and image are now live for all customers.");
            
            profileImageFile = null;
        }).catch(() => {
            showToast('❌ Failed to save profile', 'error');
        });
    }

    // MENU SAVE - now shows success modal
    async function saveMenuItem() {
        const key = document.getElementById('mi-key').value;
        const data = {
            name: document.getElementById('mi-name').value.trim(),
            price: parseFloat(document.getElementById('mi-price').value) || 0,
            category: document.getElementById('mi-cat').value.trim(),
            emoji: document.getElementById('mi-emoji').value.trim() || '🍴',
            description: document.getElementById('mi-desc').value.trim(),
            deliveryTime: parseInt(document.getElementById('mi-delivery').value) || null,
            available: true
        };

        if (!data.name) return showToast('⚠ Item name is required', 'error');
        if (data.price <= 0) return showToast('⚠ Price must be greater than 0', 'error');

        if (currentImageFile) {
            document.getElementById('upload-status').textContent = 'uploading to Cloudinary...';
            try {
                data.imageURL = await uploadToCloudinary(currentImageFile);
            } catch (e) {
                showToast('❌ Image upload failed', 'error');
                return;
            }
        } else {
            const existing = document.getElementById('mi-image-url').value;
            if (existing) data.imageURL = existing;
        }

        const ref = key 
            ? db.ref(`vendors/${currentKey}/menu/${key}`) 
            : db.ref(`vendors/${currentKey}/menu`).push();

        ref.set(data).then(() => {
            showSuccessModal("✅ Item Saved!", 
                "Menu item with image is now live for customers.");
            closeModal();
        }).catch(() => showToast('❌ Failed to save item', 'error'));
    }

    // Rest of your code (renderMenu, initDashboard, hours, logout, etc.) remains exactly the same
    // ... (paste all remaining functions from your previous code here) ...

    </script>
</body>
</html>
